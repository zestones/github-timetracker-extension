# =============================================================
# Release — build, version bump, zip & GitHub release
# =============================================================
# Trigger: push a tag like v1.2.3
# Flow:
#   1. Extract version from tag
#   2. Update package.json + manifest.json versions
#   3. Commit version bump back to main
#   4. Build the extension
#   5. Zip dist/ as a ready-to-install Chrome extension
#   6. Create a GitHub release with the zip attached
# =============================================================

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.PAT_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update package.json & manifest.json versions
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          node -e "
            const fs = require('fs');
            for (const file of ['package.json', 'manifest.json']) {
              const json = JSON.parse(fs.readFileSync(file, 'utf8'));
              json.version = '${VERSION}';
              fs.writeFileSync(file, JSON.stringify(json, null, 2) + '\n');
            }
          "

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json manifest.json
          git diff --cached --quiet || git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git push

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Zip extension
        run: cd dist && zip -r ../github-time-tracker-v${{ steps.version.outputs.version }}.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          body: |
            ## GitHub Time Tracker v${{ steps.version.outputs.version }}

            ### Installation
            1. Download `github-time-tracker-v${{ steps.version.outputs.version }}.zip` below
            2. Extract the zip
            3. Open `chrome://extensions` → enable **Developer mode**
            4. Click **Load unpacked** → select the extracted folder
          files: github-time-tracker-v${{ steps.version.outputs.version }}.zip
