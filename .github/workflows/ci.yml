name: Quality Check

on:
  pull_request:
    branches: [main, dev]

jobs:
  quality:
    name: Lint & Typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Biome check
        run: npx @biomejs/biome check ./src

      - name: Typecheck
        run: npm run typecheck
